<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Governance Resource Manager</title>
  <style>
    :root {
      --primary: #4361ee;
      --primary-dark: #3a56d4;
      --primary-light: #e9ecff;
      --success: #2ecc71;
      --success-dark: #27ae60;
      --danger: #e74c3c;
      --warning: #f39c12;
      --light: #f8f9fa;
      --dark: #343a40;
      --gray: #6c757d;
      --border: #dee2e6;
      --background: #f5f8ff;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: var(--background);
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      padding: 2rem;
      margin-bottom: 2rem;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.08);
    }
    
    header {
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
    }
    
    header .logo {
      width: 48px;
      height: 48px;
      background-color: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 1rem;
      color: white;
      font-size: 1.75rem;
    }
    
    h1 {
      font-size: 1.75rem;
      color: var(--dark);
      margin-bottom: 0.5rem;
    }
    
    h2 {
      font-size: 1.5rem;
      color: var(--dark);
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 0.5rem;
      display: inline-block;
    }
    
    h3 {
      font-size: 1.2rem;
      color: var(--dark);
      margin-bottom: 1rem;
    }
    
    .subtitle {
      color: var(--gray);
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--dark);
    }
    
    .form-control {
      width: 100%;
      padding: 0.875rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
      outline: none;
    }
    
    .input-group {
      display: flex;
      align-items: center;
    }
    
    .input-group .form-control {
      flex: 1;
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }
    
    .input-group-append {
      margin-left: -1px;
    }
    
    .input-group-append .btn {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
      height: 100%;
    }
    
    textarea.form-control {
      min-height: 100px;
      resize: vertical;
    }
    
    .btn {
      display: inline-block;
      font-weight: 500;
      text-align: center;
      vertical-align: middle;
      cursor: pointer;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      line-height: 1.5;
      border-radius: 8px;
      transition: all 0.2s ease-in-out;
      border: none;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
    }
    
    .btn-primary {
      background-color: var(--primary);
      color: white;
    }
    
    .btn-primary:hover:not(:disabled) {
      background-color: var(--primary-dark);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
    }
    
    .btn-success {
      background-color: var(--success);
      color: white;
    }
    
    .btn-success:hover:not(:disabled) {
      background-color: var(--success-dark);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
    }
    
    .btn-secondary {
      background-color: var(--light);
      color: var(--dark);
      border: 1px solid var(--border);
    }
    
    .btn-secondary:hover:not(:disabled) {
      background-color: #e9ecef;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
    }
    
    .btn-sm {
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
    }
    
    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      box-shadow: none;
    }
    
    .divider {
      height: 1px;
      background-color: var(--border);
      margin: 2rem 0;
    }
    
    .status {
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
    }
    
    .status:before {
      content: '';
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin-right: 0.75rem;
      flex-shrink: 0;
    }
    
    .status-success {
      background-color: rgba(46, 204, 113, 0.1);
      color: var(--success-dark);
    }
    
    .status-success:before {
      background-color: var(--success);
    }
    
    .status-error {
      background-color: rgba(231, 76, 60, 0.1);
      color: var(--danger);
    }
    
    .status-error:before {
      background-color: var(--danger);
    }
    
    .status-loading {
      background-color: rgba(241, 242, 243, 0.7);
      color: var(--gray);
    }
    
    .status-loading:before {
      background-color: var(--gray);
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
    
    .hidden {
      display: none;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    
    .card-header h2 {
      margin-bottom: 0;
    }
    
    .tab-container {
      display: flex;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    
    .tab {
      padding: 1rem 1.5rem;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .tab.active {
      border-bottom-color: var(--primary);
      color: var(--primary);
    }
    
    .tab:hover:not(.active) {
      border-bottom-color: var(--border);
      background-color: var(--primary-light);
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .worksheet-list {
      margin-top: 1.5rem;
    }
    
    .worksheet-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      margin-bottom: 0.75rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .worksheet-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
    }
    
    .worksheet-name {
      font-weight: 500;
    }
    
    .action-buttons {
      display: flex;
      gap: 0.5rem;
    }
    
    .table-container {
      margin-top: 2rem;
      overflow-x: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    th {
      background-color: var(--primary-light);
      font-weight: 500;
    }
    
    tr:hover {
      background-color: rgba(67, 97, 238, 0.05);
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      margin-top: 1.5rem;
      gap: 0.5rem;
    }
    
    .pagination button {
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      background-color: white;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .pagination button:hover, .pagination button.active {
      background-color: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .flex-row {
      display: flex;
      flex-direction: row;
      gap: 1rem;
    }
    
    .flex-column {
      display: flex;
      flex-direction: column;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    
    .modal-content {
      background-color: white;
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }
    
    .modal-title {
      font-size: 1.5rem;
      font-weight: 500;
    }
    
    .close-button {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--gray);
      transition: color 0.2s;
    }
    
    .close-button:hover {
      color: var(--danger);
    }
    
    .worksheet-controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    
    .btn-icon {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .card-footer {
      margin-top: 1.5rem;
      display: flex;
      justify-content: flex-end;
    }
    
    .float-right {
      float: right;
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }
      
      .card {
        padding: 1.5rem;
      }
      
      .flex-row {
        flex-direction: column;
      }
      
      .tab {
        padding: 0.75rem 1rem;
      }
      
      .worksheet-item {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .action-buttons {
        margin-top: 1rem;
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">📊</div>
      <div>
        <h1>AI Governance Resource Manager</h1>
        <p class="subtitle">Collect, organize, and manage AI governance resources efficiently</p>
      </div>
    </header>
    
    <div class="tab-container">
      <div class="tab active" data-tab="add-resource">Add Resource</div>
      <div class="tab" data-tab="view-worksheets">View Worksheets</div>
      <div class="tab" data-tab="manage-worksheets">Manage Worksheets</div>
    </div>
    
    <div id="add-resource" class="tab-content active">
      <div class="card">
        <div class="card-header">
          <h2>Add Resource</h2>
          <button id="viewSheetBtn" class="btn btn-primary">View Sheet</button>
        </div>
        <form id="linkForm">
          <div class="form-group">
            <label for="link">Resource URL</label>
            <input type="url" id="link" class="form-control" placeholder="https://example.com/resource" required>
          </div>
          
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" class="form-control" placeholder="Enter title">
          </div>
          
          <div class="form-group">
            <label for="summary">Summary</label>
            <textarea id="summary" class="form-control" placeholder="Enter summary"></textarea>
          </div>
          
          <div class="form-group">
            <label for="date">Publication Date</label>
            <input type="date" id="date" class="form-control">
          </div>
          
          <div class="form-group">
            <label for="category">Worksheet</label>
            <div class="input-group">
              <select id="category" class="form-control">
                <option value="">Loading worksheets...</option>
              </select>
              <div class="input-group-append">
                <button type="button" id="refreshWorksheetsBtn" class="btn btn-primary btn-sm" title="Refresh worksheets">
                  ↻
                </button>
              </div>
            </div>
          </div>
          <button type="submit" id="submitBtn" class="btn btn-primary" disabled>Add Resource</button>
        </form>
        <div id="status" class="hidden"></div>
      </div>
    </div>
    
    <div id="view-worksheets" class="tab-content">
      <div class="card">
        <div class="card-header">
          <h2>Worksheets</h2>
          <button id="refreshWorksheetListBtn" class="btn btn-secondary btn-sm">
            <span class="btn-icon">↻ Refresh</span>
          </button>
        </div>
        <div class="worksheet-list" id="worksheetList">
          <div class="status status-loading">Loading worksheets...</div>
        </div>
      </div>
    </div>
    
    <div id="manage-worksheets" class="tab-content">
      <div class="card">
        <div class="card-header">
          <h2>Create New Worksheet</h2>
        </div>
        <div class="form-group">
          <label for="newWorksheetName">Worksheet Name</label>
          <input type="text" id="newWorksheetName" class="form-control" placeholder="Enter descriptive name">
        </div>
        <button type="button" id="createWorksheetBtn" class="btn btn-success">Create Worksheet</button>
        <div id="worksheetStatus" class="hidden"></div>
      </div>
    </div>
  </div>
  
  <!-- Modal for viewing worksheet data -->
  <div id="worksheetModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Worksheet Title</h3>
        <button class="close-button" id="closeModal">&times;</button>
      </div>
      <div class="worksheet-controls">
        <div class="worksheet-info">
          <p id="worksheetRowCount">Loading...</p>
        </div>
        <div>
          <input type="text" id="searchInput" class="form-control" placeholder="Search resources...">
        </div>
      </div>
      <div class="table-container">
        <table id="worksheetTable">
          <thead>
            <tr>
              <th>Link</th>
              <th>Summary</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="worksheetData">
            <tr>
              <td colspan="3">Loading data...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <script>
    // Tab navigation
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', function() {
        // Remove active class from all tabs
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        
        // Add active class to clicked tab
        this.classList.add('active');
        document.getElementById(this.getAttribute('data-tab')).classList.add('active');
      });
    });

    async function fetchSheetId() {
      try {
        const response = await fetch("http://localhost:5000/get-sheet-id");
        const data = await response.json();
        
        if (data.status === "success") {
          return data.sheet_id;
        } else {
          console.error("Error fetching sheet ID:", data.error);
          return null;
        }
      } catch (error) {
        console.error("Error fetching sheet ID:", error.message);
        return null;
      }
    }

    // Function to open the Google Sheet
    async function openGoogleSheet() {
      const sheetId = await fetchSheetId();
      
      if (sheetId) {
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}`;
        window.open(sheetUrl, "_blank");
      } else {
        // Show an error if we couldn't get the sheet ID
        showStatus("status", "Could not retrieve Google Sheet link", "error");
      }
    }

    document.getElementById("viewSheetBtn").addEventListener("click", openGoogleSheet);
    
    // Function to show status message
    function showStatus(elementId, message, type) {
      const statusElement = document.getElementById(elementId);
      statusElement.textContent = message;
      statusElement.className = `status status-${type}`;
      
      // Auto-hide success messages after 5 seconds
      if (type === 'success') {
        setTimeout(() => {
          statusElement.className = 'hidden';
        }, 5000);
      }
    }
    
    // Function to fetch worksheets
    async function fetchWorksheets() {
      const categorySelect = document.getElementById("category");
      const submitBtn = document.getElementById("submitBtn");
      
      try {
        showStatus("status", "Loading worksheets...", "loading");
        
        const response = await fetch("http://localhost:5000/get-worksheets");
        const data = await response.json();
        
        if (data.worksheets && data.worksheets.length > 0) {
          // Clear the loading option
          categorySelect.innerHTML = "";
          
          // Add a placeholder option
          const placeholderOption = document.createElement("option");
          placeholderOption.value = "";
          placeholderOption.textContent = "Select a worksheet";
          categorySelect.appendChild(placeholderOption);
          
          // Populate dropdown with worksheet names
          data.worksheets.forEach(worksheetName => {
            const option = document.createElement("option");
            option.value = worksheetName;
            option.textContent = worksheetName;
            categorySelect.appendChild(option);
          });
          
          submitBtn.disabled = false;
          document.getElementById("status").className = "hidden";
          
          // Update the worksheet list if we're on that tab
          populateWorksheetList(data.worksheets);
        } else {
          showStatus("status", "No worksheets found. Create one below.", "error");
        }
      } catch (error) {
        showStatus("status", `Error loading worksheets: ${error.message}`, "error");
      }
    }
    
    // Function to populate the worksheet list
    function populateWorksheetList(worksheets) {
      const worksheetList = document.getElementById("worksheetList");
      
      if (!worksheets || worksheets.length === 0) {
        worksheetList.innerHTML = '<div class="status status-error">No worksheets found</div>';
        return;
      }
      
      worksheetList.innerHTML = '';
      
      worksheets.forEach(name => {
        const item = document.createElement("div");
        item.className = "worksheet-item";
        
        item.innerHTML = `
          <div class="worksheet-name">${name}</div>
          <div class="action-buttons">
            <button class="btn btn-secondary btn-sm view-worksheet" data-name="${name}">View</button>
          </div>
        `;
        
        worksheetList.appendChild(item);
      });
      
      // Add event listeners to view buttons
      document.querySelectorAll('.view-worksheet').forEach(button => {
        button.addEventListener('click', function() {
          const worksheetName = this.getAttribute('data-name');
          openWorksheetModal(worksheetName);
        });
      });
    }
    
    // Function to open worksheet modal and load data
    async function openWorksheetModal(worksheetName) {
      const modal = document.getElementById("worksheetModal");
      const modalTitle = document.getElementById("modalTitle");
      const worksheetData = document.getElementById("worksheetData");
      const worksheetRowCount = document.getElementById("worksheetRowCount");
      
      // Set the modal title
      modalTitle.textContent = worksheetName;
      
      // Show the modal
      modal.style.display = "flex";
      
      // Set loading state
      worksheetData.innerHTML = '<tr><td colspan="3">Loading data...</td></tr>';
      worksheetRowCount.textContent = "Loading...";
      
      try {
        // Fetch worksheet data
        const response = await fetch(`http://localhost:5000/worksheet-data?name=${encodeURIComponent(worksheetName)}`);
        const data = await response.json();
        
        if (data.status === "success") {
          worksheetRowCount.textContent = `Total entries: ${data.rows.length}`;
          
          if (data.rows.length === 0) {
            worksheetData.innerHTML = '<tr><td colspan="3">No data in this worksheet</td></tr>';
            return;
          }
          
          // Clear previous data
          worksheetData.innerHTML = '';
          
          // Populate table with data
          data.rows.forEach(row => {
            const tr = document.createElement("tr");
            
            // Link cell with clickable URL
            const linkCell = document.createElement("td");
            const link = document.createElement("a");
            link.href = row[0];
            link.textContent = row[0].length > 40 ? row[0].substring(0, 40) + "..." : row[0];
            link.target = "_blank";
            linkCell.appendChild(link);
            tr.appendChild(linkCell);
            
            // Summary cell
            const summaryCell = document.createElement("td");
            summaryCell.textContent = row[1];
            tr.appendChild(summaryCell);
            
            // Date cell
            const dateCell = document.createElement("td");
            dateCell.textContent = row[2];
            tr.appendChild(dateCell);
            
            worksheetData.appendChild(tr);
          });
        } else {
          worksheetData.innerHTML = `<tr><td colspan="3">Error: ${data.error}</td></tr>`;
        }
      } catch (error) {
        worksheetData.innerHTML = `<tr><td colspan="3">Error: ${error.message}</td></tr>`;
      }
    }
    
    // Close modal when clicking the close button or outside the modal
    document.getElementById("closeModal").addEventListener("click", function() {
      document.getElementById("worksheetModal").style.display = "none";
    });
    
    window.addEventListener("click", function(event) {
      const modal = document.getElementById("worksheetModal");
      if (event.target === modal) {
        modal.style.display = "none";
      }
    });
    
    // Search function for worksheet data
    document.getElementById("searchInput").addEventListener("input", function() {
      const searchValue = this.value.toLowerCase();
      const rows = document.querySelectorAll("#worksheetData tr");
      
      rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(searchValue) ? "" : "none";
      });
    });

    // Fetch worksheets when page loads
    document.addEventListener('DOMContentLoaded', () => {
      // Set default date to today
      const today = new Date().toISOString().split('T')[0];
      document.getElementById("date").value = today;
      
      // Fetch worksheets
      fetchWorksheets();
    });
    
    // Refresh worksheets button
    document.getElementById("refreshWorksheetsBtn").addEventListener("click", fetchWorksheets);
    document.getElementById("refreshWorksheetListBtn").addEventListener("click", fetchWorksheets);
    
    // Create new worksheet
    document.getElementById("createWorksheetBtn").addEventListener("click", async () => {
      const nameInput = document.getElementById("newWorksheetName");
      const name = nameInput.value.trim();
      
      if (!name) {
        showStatus("worksheetStatus", "Please enter a worksheet name", "error");
        return;
      }
      
      try {
        showStatus("worksheetStatus", "Creating worksheet...", "loading");
        
        const response = await fetch("http://localhost:5000/create-worksheet", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ title: name })
        });
        
        const result = await response.json();
        
        if (response.ok) {
          showStatus("worksheetStatus", result.message, "success");
          nameInput.value = "";
          
          // Refresh the worksheet list
          fetchWorksheets();
        } else {
          showStatus("worksheetStatus", `Error: ${result.error}`, "error");
        }
      } catch (error) {
        showStatus("worksheetStatus", `Error: ${error.message}`, "error");
      }
    });

    // Function to scrape article content
    async function scrapeArticle(url) {
      try {
        showStatus("status", "Scraping article...", "loading");
        
        const response = await fetch("http://localhost:5000/scrape-article", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ url: url })
        });
        
        const data = await response.json();
        
        if (data.status === "success") {
          // Auto-fill both title and summary fields
          document.getElementById("title").value = data.title;
          document.getElementById("summary").value = data.summary;
          showStatus("status", "Article scraped successfully!", "success");
        } else {
          showStatus("status", `Error: ${data.error}`, "error");
        }
      } catch (error) {
        showStatus("status", `Error: ${error.message}`, "error");
      }
    }

    // Add event listener for URL input
    document.getElementById("link").addEventListener("blur", function() {
      const url = this.value.trim();
      if (url && url.startsWith('http')) {
        scrapeArticle(url);
      }
    });

    // Submit link form
    document.getElementById("linkForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const linkInput = document.getElementById("link");
      const titleInput = document.getElementById("title");
      const summaryInput = document.getElementById("summary");
      const categorySelect = document.getElementById("category");
      
      if (!linkInput.value) {
        showStatus("status", "Please enter a valid URL", "error");
        return;
      }
      
      if (!categorySelect.value) {
        showStatus("status", "Please select a worksheet", "error");
        return;
      }
      
      try {
        showStatus("status", "Adding resource...", "loading");
        
        const data = {
          link: linkInput.value,
          title: titleInput.value,
          summary: summaryInput.value,
          date: document.getElementById("date").value,
          category: categorySelect.value
        };

        const res = await fetch("http://localhost:5000/add-link", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        
        if (result.status === "success") {
          showStatus("status", "Resource added successfully!", "success");
          
          // Reset the form but keep the category
          const currentCategory = categorySelect.value;
          document.getElementById("linkForm").reset();
          document.getElementById("date").value = new Date().toISOString().split('T')[0];
          categorySelect.value = currentCategory;
        } else {
          showStatus("status", `Error: ${result.error}`, "error");
        }
      } catch (error) {
        showStatus("status", `Error: ${error.message}`, "error");
      }
    });
  </script>
</body>
